<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' https://api.fontshare.com https://fonts.googleapis.com https://fonts.gstatic.com; font-src 'self' https://api.fontshare.com https://fonts.gstatic.com; script-src 'self' 'unsafe-inline'">
  <title>typer-mini</title>
  <link href="https://api.fontshare.com/v2/css?f[]=general-sans@200,300,400,500,600,700&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header id="titlebar">
    <div class="titlebar-drag">
      <span class="titlebar-title">typer-mini</span>
    </div>
    <div class="titlebar-controls">
      <button id="btn-theme" class="titlebar-btn" title="Toggle theme">◐</button>
      <button id="btn-minimize" class="titlebar-btn" title="Minimize">─</button>
      <button id="btn-maximize" class="titlebar-btn" title="Maximize">□</button>
      <button id="btn-close" class="titlebar-btn titlebar-close" title="Close">✕</button>
    </div>
  </header>

  <main id="content">
    <div class="editor-wrapper">
      <textarea
        id="editor"
        placeholder="Start typing..."
        spellcheck="false"
      ></textarea>
      <div id="stats" class="stats">
        <span id="word-count">0 words</span>
        <span id="char-count">0 chars</span>
      </div>
    </div>
  </main>

  <script src="renderer.js"></script>
</body>
</html>
